<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr. Mareike Schmitt – Digitale Visitenkarte</title>
  <meta name="description" content="Dr. Mareike Schmitt – Single- und Beziehungscoaching | BECOMING HER">
  <meta name="theme-color" content="#B8193E">
  <link rel="icon" href="assets/logo.png" type="image/png">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #FAF8F5 0%, #F5F0F0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #2c3e50;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #B8193E 0%, #C4A0A5 100%);
      padding: 36px 32px 30px;
      text-align: center;
    }

    .logo {
      width: 220px;
      max-width: 75%;
      height: auto;
      margin-bottom: 12px;
      border-radius: 12px;
    }

    .tagline {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .card-body {
      padding: 28px 32px 32px;
    }

    .contact-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 28px;
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-decoration: none;
      color: #2c3e50;
      transition: color 0.2s;
    }

    a.contact-item:hover {
      color: #B8193E;
    }

    .contact-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 2px;
      color: #7A7044;
    }

    .contact-text {
      font-size: 14px;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #D4C5C8, transparent);
      margin-bottom: 24px;
    }

    .qr-section {
      text-align: center;
      margin-bottom: 24px;
    }

    .qr-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #8c8e96;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .qr-code {
      width: 160px;
      height: 160px;
      border-radius: 12px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #B8193E 0%, #D4546E 100%);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(184, 25, 62, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(184, 25, 62, 0.4);
    }

    .btn-secondary {
      background: #FBF7F8;
      color: #2c3e50;
      border: 1px solid #E8DFE1;
    }

    .btn-secondary:hover {
      background: #F5EDEF;
    }

    .btn-tertiary {
      background: #F5F3EE;
      color: #7A7044;
      border: 1px solid #E5E1D6;
    }

    .btn-tertiary:hover {
      background: #EDEADF;
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .footer {
      text-align: center;
      padding: 0 32px 20px;
      font-size: 11px;
      color: #b0b0b0;
      line-height: 1.6;
    }

    .footer a {
      color: #9a9a9a;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #B8193E;
    }

    @media (max-width: 460px) {
      body {
        padding: 16px 12px;
        align-items: flex-start;
        padding-top: 32px;
      }

      .card-header {
        padding: 28px 24px 24px;
      }

      .card-body {
        padding: 24px 24px 28px;
      }

      .footer {
        padding: 0 24px 16px;
      }
    }
  </style>
</head>
